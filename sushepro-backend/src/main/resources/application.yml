server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: sushepro-backend
  config:
    import: optional:nacos:${spring.application.name}.yml
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/susheguanli?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 657210abc

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sushepro.pojo
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: your-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always